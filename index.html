<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GudangSmart v9.0 - Premium Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --text: #2b2d42;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px 20px;
            text-align: center;
            border-radius: 0 0 25px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px;
            margin: -20px auto 40px;
            padding: 0 15px;
        }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
        }

        h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin: 15px 0;
        }

        .preview-area {
            background: #f8fbff;
            border: 2px dashed var(--success);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .scanned-code {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin: 5px 0;
        }

        .scanned-name {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 600;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #d1d5db; cursor: not-allowed; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #6b7280;
            padding: 10px;
        }

        td {
            padding: 15px 10px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .badge-qty {
            background: #e0f2fe;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .footer-info {
            font-size: 0.75rem;
            text-align: center;
            color: #9ca3af;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">📦 Warehouse Pro</h2>
        <p style="margin:5px 0 0; opacity:0.8; font-size:0.9rem;">Sistem Management Pengambilan Barang</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>👤 Data Pengambil</h3>
            <input type="text" id="userName" placeholder="Nama Lengkap">
            <input type="text" id="userDept" placeholder="Departemen (Contoh: Produksi)">
            <input type="text" id="userPurpose" placeholder="Keperluan / Nama Proyek">
            
            <div style="margin-top:10px;">
                <label style="font-size:0.75rem; font-weight:bold; color:#666;">Upload Data Barang (CSV):</label>
                <input type="file" id="csvMaster" accept=".csv" onchange="loadMasterData(this)" style="padding:8px; font-size:0.8rem;">
            </div>
            <p id="masterStatus" style="font-size:0.75rem; margin:5px 0 0;"></p>
        </div>

        <div class="card">
            <h3>📷 Scanner Barcode</h3>
            <div id="reader"></div>
            
            <div class="preview-area">
                <div id="tempKode" class="scanned-code">-</div>
                <div id="tempNama" class="scanned-name">Menunggu Scan...</div>
                
                <div style="margin:15px 0;">
                    <label style="font-size:0.8rem;">Jumlah Pengambilan:</label><br>
                    <input type="number" id="tempQty" value="1" min="1" style="width:100px; text-align:center; margin-top:5px;">
                </div>
                
                <button id="btnSimpan" class="btn btn-primary" onclick="addToLog()" disabled>
                    ✅ SIMPAN KE RIWAYAT
                </button>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>📜 Riwayat Terakhir</h3>
                <button onclick="exportLog()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">Unduh CSV</button>
            </div>
            
            <div style="overflow-x:auto;">
                <table id="tabelLog">
                    <thead>
                        <tr>
                            <th>Barang & Waktu</th>
                            <th>Qty</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <button onclick="clearAll()" class="btn btn-danger" style="margin-top:20px; font-size:0.8rem; padding:10px; background:#fff; color:var(--danger); border:1px solid var(--danger);">
                Hapus Semua Riwayat
            </button>
        </div>

        <div class="footer-info">
            Built by Hendro Arya &bull; 2026 &bull; Secure HTTPS
        </div>
    </div>

<script>
    let masterBarang = {}; 
    let logData = JSON.parse(localStorage.getItem('logs_premium_v9')) || [];
    let currentCode = null;

    renderTable();

    // Fungsi Load CSV dengan Auto-Detect ; atau ,
    function loadMasterData(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const rows = e.target.result.split("\n");
            let count = 0;
            rows.forEach(row => {
                let cols = row.includes(";") ? row.split(";") : row.split(",");
                if(cols.length >= 2) {
                    masterBarang[cols[0].trim()] = cols[1].trim();
                    count++;
                }
            });
            document.getElementById('masterStatus').innerHTML = `<span style="color:var(--primary)">✅ <b>${count}</b> barang berhasil dimuat.</span>`;
        };
        reader.readAsText(input.files[0]);
    }

    // Konfigurasi Scanner Otomatis
    function onScanSuccess(decodedText) {
        currentCode = decodedText;
        document.getElementById('tempKode').innerText = decodedText;
        document.getElementById('tempNama').innerText = masterBarang[decodedText] || "⚠️ BARANG TIDAK TERDAFTAR";
        document.getElementById('btnSimpan').disabled = false;
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 15, 
        qrbox: { width: 250, height: 150 },
        aspectRatio: 1.0
    });
    html5QrcodeScanner.render(onScanSuccess);

    function addToLog() {
        const data = {
            waktu: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            nama: document.getElementById('userName').value || "User",
            barang: document.getElementById('tempNama').innerText,
            qty: document.getElementById('tempQty').value,
            untuk: document.getElementById('userPurpose').value || "-",
            kode: currentCode
        };

        logData.unshift(data);
        localStorage.setItem('logs_premium_v9', JSON.stringify(logData));
        
        // Reset UI Preview
        document.getElementById('btnSimpan').disabled = true;
        document.getElementById('tempNama').innerText = "Tersimpan!";
        document.getElementById('tempQty').value = 1;
        
        renderTable();
    }

    function renderTable() {
    const tbody = document.querySelector("#tabelLog tbody");
    // Header tabel diperbarui agar sesuai dengan jumlah kolom baru
    document.querySelector("#tabelLog theater tr").innerHTML = `
        <th>Waktu & Pengambil</th>
        <th>Barang & Kode</th>
        <th>Qty</th>
        <th>Untuk Apa</th>
        <th>Aksi</th>
    `;

    tbody.innerHTML = logData.map((item, index) => `
        <tr>
            <td>
                <span style="font-size:0.7rem; color:#888;">${item.waktu}</span><br>
                <strong>${item.nama}</strong><br>
                <small style="color:#666;">Dept: ${item.dept}</small>
            </td>
            <td>
                <strong>${item.barang}</strong><br>
                <code style="font-size:0.75rem; background:#eee; padding:2px 4px; border-radius:4px;">${item.kode}</code>
            </td>
            <td><span class="badge-qty">${item.qty}</span></td>
            <td><em style="font-size:0.85rem; color:#444;">${item.untuk}</em></td>
            <td>
                <button onclick="deleteItem(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">✕</button>
            </td>
        </tr>
    `).join('');
}


    function deleteItem(i) {
        if(confirm("Hapus baris ini?")) {
            logData.splice(i, 1);
            localStorage.setItem('logs_premium_v9', JSON.stringify(logData));
            renderTable();
        }
    }

    function clearAll() {
        if(confirm("Hapus semua riwayat pengambilan?")) {
            logData = [];
            localStorage.removeItem('logs_premium_v9');
            renderTable();
        }
    }

    function exportLog() {
        let csv = "Waktu;Nama;Barang;Qty;Keperluan;Kode\n";
        logData.forEach(r => {
            csv += `${r.waktu};${r.nama};${r.barang};${r.qty};${r.untuk};${r.kode}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Laporan_Gudang_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }
</script>
</body>
</html>
